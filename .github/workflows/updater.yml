name: Update files
run-name: Workflow update from Azure AVM (using Python)
on:
  schedule:
    - cron:  '27 7 * * *'
  workflow_dispatch:
  pull_request:
    types: [closed]
jobs:
  update-files:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.file.outputs.content }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: gjtorikian/gh-actions-lockfile@24be31e941fc36df78f82762cd45c28b4cbcaedd # v1.2.0
        with:
          mode: verify

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
          cache: 'pip' # caching pip dependencies

      - name: Execute Python update script
        run: |
          echo "Running Python script to update workflow files..."
          pip install -r requirements.txt
          python3 ./update.py
          
      - name: Commit changes
        run: |
          if [[ `git status --porcelain` ]]; then
            echo "OK: Changes detected."
            git config --local user.name "GitHub Action"
            git config --local user.email "johannes.postler@glueckkanja.com"
            git add .
            git commit -m "Workflow update from Azure AVM"
            git push
          else
            echo "No changes were detected :)"
          fi
